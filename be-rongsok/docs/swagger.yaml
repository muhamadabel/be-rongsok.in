openapi: 3.0.3
info:
  title: Rongsok.in Backend API
  version: 1.0.0
  description: |
    API for the Rongsok.in waste‑recycling marketplace.
    Includes authentication, collector discovery, order management, rating, and profile handling.
servers:
  - url: http://localhost:3000/api/v1
    description: Development server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRegisterRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [CUSTOMER, COLLECTOR]
        avatarUrl:
          type: string
          format: uri
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [CUSTOMER, COLLECTOR, ADMIN]
        avgRating:
          type: number
          format: float
        avatarUrl:
          type: string
          format: uri
    CollectorProfile:
      type: object
      properties:
        id:
          type: string
        shopName:
          type: string
        description:
          type: string
        shopImageUrl:
          type: string
          format: uri
        radiusKm:
          type: number
        isOpen:
          type: boolean
        isPremium:
          type: boolean
        priorityScore:
          type: integer
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/CollectorCatalog'
    CollectorCatalog:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        minPrice:
          type: number
        maxPrice:
          type: number
        isActive:
          type: boolean
    WasteCategory:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        iconUrl:
          type: string
          format: uri
    DiscoveryResult:
      type: object
      properties:
        collectorId:
          type: string
        shopName:
          type: string
        distanceM:
          type: number
        priceRange:
          type: string
    OrderCreateRequest:
      type: object
      required: [lat, lng, method]
      properties:
        categoryId:
          type: string
        estimatedWeight:
          type: number
        notes:
          type: string
        photoUrl:
          type: string
          format: uri
        lat:
          type: number
        lng:
          type: number
        method:
          type: string
          enum: [PICKUP, DROPOFF]
        collectorId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemCreate'
    OrderItemCreate:
      type: object
      required: [categoryId, estimatedWeight]
      properties:
        categoryId:
          type: string
        estimatedWeight:
          type: number
        notes:
          type: string
    OrderItem:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        categoryId:
          type: string
        category:
          $ref: '#/components/schemas/WasteCategory'
        estimatedWeight:
          type: number
        actualWeight:
          type: number
        agreedPrice:
          type: number
        notes:
          type: string
    Order:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        collectorId:
          type: string
        categoryId:
          type: string
        method:
          type: string
          enum: [PICKUP, DROPOFF]
        status:
          type: string
          enum: [PENDING, CONFIRMED, IN_PROGRESS, AWAITING_CONFIRMATION, COMPLETED, CANCELLED]
        estimatedWeight:
          type: number
        actualWeight:
          type: number
        agreedPrice:
          type: number
        totalPrice:
          type: number
        photoUrl:
          type: string
          format: uri
        transactionProofUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    RatingCreateRequest:
      type: object
      required: [orderId, raterId, rateeId, score]
      properties:
        orderId:
          type: string
        raterId:
          type: string
        rateeId:
          type: string
        score:
          type: integer
          minimum: 1
          maximum: 5
        reviewText:
          type: string
        photoUrl:
          type: string
          format: uri
paths:
  /auth/register:
    post:
      tags:
        - "Epic 1: Autentikasi & Onboarding"
      summary: Register a new user (customer or collector)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: User created
  /auth/login:
    post:
      tags:
        - "Epic 1: Autentikasi & Onboarding"
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/me:
    get:
      tags:
        - "Epic 1: Autentikasi & Onboarding"
      security:
        - BearerAuth: []
      summary: Get current authenticated user
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /discovery/search:
    get:
      tags:
        - "Epic 2: Pencarian & Discovery"
      security:
        - BearerAuth: []
      summary: Search nearby collectors
      parameters:
        - in: query
          name: lat
          schema:
            type: number
          required: true
        - in: query
          name: lng
          schema:
            type: number
          required: true
        - in: query
          name: categoryId
          schema:
            type: string
          required: true
        - in: query
          name: radius
          schema:
            type: number
          description: Radius in km
          default: 5
      responses:
        '200':
          description: List of collectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DiscoveryResult'
  /collector/profile:
    post:
      tags:
        - "Epic 1: Autentikasi & Onboarding"
      security:
        - BearerAuth: []
      summary: Create collector profile (after collector registration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectorProfile'
      responses:
        '201':
          description: Profile created
    patch:
      tags:
        - "Epic 1: Autentikasi & Onboarding"
      security:
        - BearerAuth: []
      summary: Update collector profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectorProfile'
      responses:
        '200':
          description: Profile updated
  /collector/catalogs:
    patch:
      tags:
        - "Epic 1: Autentikasi & Onboarding"
      security:
        - BearerAuth: []
      summary: Update collector catalog (price ranges per category)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CollectorCatalog'
      responses:
        '200':
          description: Catalogs updated
  /orders:
    post:
      tags:
        - "Epic 3: Order Management System"
      security:
        - BearerAuth: []
      summary: Customer creates a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /orders/{id}:
    get:
      tags:
        - "Epic 3: Order Management System"
      security:
        - BearerAuth: []
      summary: Get order details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    patch:
      tags:
        - "Epic 3: Order Management System"
      security:
        - BearerAuth: []
      summary: Update order status (accept, reject, validate, confirm)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [accept, reject, validate, confirm]
                actualWeight:
                  type: number
                agreedPrice:
                  type: number
                transactionProofUrl:
                  type: string
                  format: uri
                items:
                  type: array
                  items:
                    type: object
                    required: [id, actualWeight, agreedPrice]
                    properties:
                      id:
                        type: string
                      actualWeight:
                        type: number
                      agreedPrice:
                        type: number
      responses:
        '200':
          description: Order updated
  /ratings:
    post:
      tags:
        - "Epic 4: Rating & Trust"
      security:
        - BearerAuth: []
      summary: Submit rating after order completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingCreateRequest'
      responses:
        '201':
          description: Rating stored
  /ratings/user/{userId}:
    get:
      tags:
        - "Epic 4: Rating & Trust"
      security:
        - BearerAuth: []
      summary: Get all ratings received by a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RatingCreateRequest'
